<div class="weather-card animate-fade-in">
    <!-- Поиск -->
    <div class="search-box">
        <input type="text" id="city-input" placeholder="Введите город (напр. Астана)">
        <button id="search-btn">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
            </svg>
        </button>
    </div>

    <!-- Главный блок -->
    <div class="main-info">
        <div class="location">
            <span class="geo-icon">📍</span>
            <span id="location-name">Ваша геопозиция</span>
        </div>
        <div class="subtitle">ЭКОЛОГИЧЕСКАЯ ЭКОСИСТЕМА</div>
        
        <div class="weather-icon" id="main-icon">☁️</div>
        <div class="temperature" id="main-temp">26°</div>
        <div class="condition" id="main-cond">Пасмурно</div>
    </div>

    <!-- НОВОЕ: Прогноз по дням недели -->
    <div class="forecast-section">
        <div class="section-title">Прогноз на ближайшие дни</div>
        <div class="forecast-list" id="forecast-list">
            <!-- Карточки дней будут создаваться через JS -->
        </div>
    </div>

    <!-- Сетка параметров (Эко-датчики, Влажность, Давление) -->
    <div class="metrics-grid">
        <div class="metric-card wide">
            <div class="metric-icon">🌊</div>
            <div class="metric-label">УРОВЕНЬ ВОДЫ (ТКАЧЁВСКАЯ)</div>
            <div class="metric-value" id="water-val">221 см</div>
            <div class="metric-status" id="water-status">В норме (Иртыш стабилен)</div>
        </div>

        <div class="metric-card">
            <div class="metric-icon">💧</div>
            <div class="metric-label">ВЛАЖНОСТЬ</div>
            <div class="metric-value" id="humidity-val">65%</div>
            <div class="metric-status">Комфортно</div>
        </div>

        <div class="metric-card">
            <div class="metric-icon">⤓</div>
            <div class="metric-label">ДАВЛЕНИЕ</div>
            <div class="metric-value" id="pressure-val">752 мм</div>
            <div class="metric-status">Ртутного столба</div>
        </div>

        <div class="metric-card">
            <div class="metric-icon">🌸</div>
            <div class="metric-label">ПЫЛЬЦА</div>
            <div class="metric-value">15 ед/м³</div>
            <div class="metric-status">Июльское цветение</div>
        </div>

        <div class="metric-card">
            <div class="metric-icon">💨</div>
            <div class="metric-label">ВЕТЕР</div>
            <div class="metric-value" id="wind-val">7.3 км/ч</div>
            <div class="metric-status">Направление: 234°</div>
        </div>
    </div>

    <button class="geo-btn" id="geo-refresh-btn">
        <span>📍</span> Моя геопозиция
    </button>
</div>
